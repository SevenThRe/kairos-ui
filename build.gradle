allprojects {
    group = 'dev.kairos.ui'
    version = '0.1.0-SNAPSHOT'
}

subprojects {
    apply plugin: 'java-library'

    repositories {
        mavenCentral()
    }

    java {
        sourceCompatibility = JavaVersion.VERSION_1_8
        targetCompatibility = JavaVersion.VERSION_1_8
    }

    tasks.withType(JavaCompile).configureEach {
        options.encoding = 'UTF-8'
        options.release = 8
    }
}

project(':ui-core') {
    dependencies { api project(':ui-api') }
}

project(':ui-components') {
    dependencies {
        api project(':ui-api')
        api project(':ui-core')
    }
}

project(':ui-esp') {
    dependencies {
        api project(':ui-api')
        api project(':ui-core')
    }
}

project(':platform-api') {
    dependencies { api project(':ui-api') }
}

project(':ui-render-opengl') {
    dependencies {
        api project(':ui-api')
        api project(':ui-core')
        api project(':platform-api')
    }
}

project(':ui-preview-svg') {
    dependencies { api project(':ui-api') }
}

project(':ui-preview-awt') {
    dependencies { api project(':ui-api') }
}

project(':platform-1.12.2-forge') {
    dependencies { api project(':platform-api') }
}

project(':platform-1.20.1-common') {
    dependencies { api project(':platform-api') }
}

project(':examples:modern-clickgui') {
    dependencies {
        implementation project(':ui-components')
        implementation project(':ui-esp')
        implementation project(':platform-api')
        implementation project(':ui-preview-svg')
        implementation project(':ui-preview-awt')
    }
}

name: verify

on:
  push:
  pull_request:

jobs:
  java8-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x scripts/verify.sh && ./scripts/verify.sh
      - uses: actions/upload-artifact@v4
        with:
          name: kairos-ui-previews
          path: out/verify/previews

  minecraft-endpoints:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install Java 8 toolchain
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
      - name: Remember Java 8
        run: echo "JAVA8_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
      - name: Install Java 17 runtime
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Remember Java 17
        run: echo "JAVA17_HOME=$JAVA_HOME" >> "$GITHUB_ENV"
      - name: Install Java 21 Gradle runtime
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.2.0'
      - name: Build Forge endpoint artifacts
        run: >-
          gradle -p minecraft-build
          -Dorg.gradle.java.installations.paths="$JAVA8_HOME,$JAVA17_HOME,$JAVA_HOME"
          :1.12.2-forge:build :1.20.1-forge:build
      - uses: actions/upload-artifact@v4
        with:
          name: kairos-ui-forge-endpoints
          path: minecraft-build/versions/*/build/libs/*.jar

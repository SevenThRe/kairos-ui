name: verify

on:
  push:
  pull_request:

jobs:
  java8-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x scripts/verify.sh && ./scripts/verify.sh

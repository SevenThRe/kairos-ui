name: verify

on:
  push:
  pull_request:

jobs:
  java8-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: chmod +x scripts/verify.sh && ./scripts/verify.sh
      - uses: actions/upload-artifact@v4
        with:
          name: kairos-ui-previews
          path: out/verify/previews

  liquidbounce-1-12-2:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Install Java 8
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '8'
      - name: Check out pinned LiquidBounce 1.12.2 source
        run: |
          git clone https://github.com/Kamiya1337/LiquidBounce-1.12.2.git liquidbounce
          git -C liquidbounce checkout 23e11be9b078a931edc68078f4be62a1c48724a5
      - name: Download pinned MCEF runtime
        run: >-
          curl -fL
          https://github.com/montoyo/mcef/releases/download/1.12.2-1.11/mcef-1.12.2-1.11-api.jar
          -o mcef-1.12.2-1.11-api.jar
      - name: Apply Kairos integration overlay
        run: |
          chmod +x integrations/liquidbounce-1.12.2/prepare.sh liquidbounce/gradlew
          ./integrations/liquidbounce-1.12.2/prepare.sh "$PWD/liquidbounce" "$PWD/mcef-1.12.2-1.11-api.jar"
      - name: Build combined Forge client
        working-directory: liquidbounce
        run: ./gradlew --no-daemon :1.12.2-Forge:build
      - name: Verify combined JAR
        run: |
          chmod +x scripts/verify-liquidbounce-jar.sh
          ./scripts/verify-liquidbounce-jar.sh liquidbounce/1.12.2-Forge/build/libs/Kairos-LiquidBounce-1.12.2-b73-kairos-r1.jar
          mkdir -p dist
          cp liquidbounce/1.12.2-Forge/build/libs/Kairos-LiquidBounce-1.12.2-b73-kairos-r1.jar dist/
      - uses: actions/upload-artifact@v4
        with:
          name: Kairos-LiquidBounce-1.12.2-b73-kairos-r1
          path: dist/Kairos-LiquidBounce-1.12.2-b73-kairos-r1.jar
          if-no-files-found: error
